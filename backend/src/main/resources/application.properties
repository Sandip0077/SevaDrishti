spring.application.name=SevaDrishti
server.port=${PORT:8080}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/sevadrishti}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:sevadrishti}
spring.data.mongodb.auto-index-creation=true
mongodb.connect-timeout-ms=${MONGODB_CONNECT_TIMEOUT_MS:5000}
mongodb.read-timeout-ms=${MONGODB_READ_TIMEOUT_MS:10000}
mongodb.server-selection-timeout-ms=${MONGODB_SERVER_SELECTION_TIMEOUT_MS:10000}

# JWT
jwt.secret=${JWT_SECRET:SevaDrishtiSecretKeyForJWTTokenGeneration2025MahakumbhVolunteerDeploymentSystem}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Logging
logging.level.com.sevadrishti=DEBUG

# AI Service Proxy Target
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
